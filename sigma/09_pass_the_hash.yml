title: Pass-the-Hash - NTLM Network Logon With Zero Key Length
id: a1b2c3d4-0009-4a09-9009-pth4624ntlm
status: experimental
description: >
  Network logon (4624 Type 3) authenticated with NTLM and a zero session-key length by a
  non-machine, non-anonymous account - a common Pass-the-Hash signature.
references:
  - https://attack.mitre.org/techniques/T1550/002/
author: laborology (Dimas)
date: 2026-06-19
tags:
  - attack.lateral-movement
  - attack.t1550.002
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4624
    LogonType: 3
    AuthenticationPackageName: 'NTLM'
    KeyLength:
      - '0'
      - '0x0'
  filter:
    TargetUserName|endswith: '$'
  filter_anon:
    TargetUserName: 'ANONYMOUS LOGON'
  condition: selection and not 1 of filter*
falsepositives:
  - Legacy applications and some backup agents that authenticate over NTLM
level: high
