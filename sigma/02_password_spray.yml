title: Password Spray - Multiple Failed Logons From One Source to Many Users
id: a1b2c3d4-0002-4a02-9002-spray4625multi
status: experimental
description: Same source IP failing authentication against several distinct usernames in a short window.
references:
  - https://attack.mitre.org/techniques/T1110/003/
author: laborology (Dimas)
date: 2026-06-19
tags:
  - attack.credential-access
  - attack.t1110.003
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4625
  timeframe: 60s
  condition: selection | count(TargetUserName) by IpAddress > 5
falsepositives:
  - Misconfigured service after a password change generating bursts of failures
  - Shared NAT egress where many users sit behind one IP
level: high
