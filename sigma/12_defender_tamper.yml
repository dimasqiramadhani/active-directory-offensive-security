title: Microsoft Defender Protection Disabled or Tampered
id: a1b2c3d4-0012-4a12-9012-defendertamper
status: experimental
description: >
  Defender protection disabled via the Defender Operational channel (5001/5010/5012/5101)
  or via a policy-key registry write (Sysmon EID 13). Common precursor to credential theft.
references:
  - https://attack.mitre.org/techniques/T1562/001/
author: laborology (Dimas)
date: 2026-06-19
tags:
  - attack.defense-evasion
  - attack.t1562.001
logsource:
  product: windows
detection:
  selection_channel:
    EventID:
      - 5001
      - 5010
      - 5012
      - 5101
  selection_registry:
    EventID: 13
    TargetObject|contains:
      - '\Windows Defender\Real-Time Protection\DisableRealtimeMonitoring'
      - '\Windows Defender\DisableAntiSpyware'
      - '\Windows Defender\Real-Time Protection\DisableBehaviorMonitoring'
      - '\Windows Defender\Real-Time Protection\DisableIOAVProtection'
      - '\Windows Defender\Real-Time Protection\DisableScriptScanning'
  condition: 1 of selection*
falsepositives:
  - Administrative maintenance windows where AV is intentionally paused
level: high
